<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PostForge Studio | Premium IG Creator</title>
    <link rel="stylesheet" href="styles.css">
    
    <!-- Tipografías Premium -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Space+Grotesk:wght@500;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Archivo+Black&display=swap" rel="stylesheet">
    
    <!-- Iconos Phosphor -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    
    <!-- html2canvas -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <!-- SortableJS -->
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
</head>
<body>

    <header class="topbar">
        <div class="logo-area">
            <i class="ph-fill ph-layers-three"></i>
            <span>PostForge <b>Studio</b></span>
        </div>
        <button class="btn-primary" id="btn-export" onclick="exportSlides()">
            <i class="ph-bold ph-download-simple"></i> Exportar Carrusel
        </button>
    </header>

    <div class="app-container">
        <aside class="sidebar">
            <div class="panel-section">
                <h3><i class="ph-bold ph-gear"></i> Ajustes Globales</h3>
                <div class="global-settings">
                    <div class="input-group">
                        <label><i class="ph ph-at"></i> Usuario / Cuenta</label>
                        <input type="text" id="global-author" placeholder="ej. @postforge" oninput="updateGlobalAuthor(this.value)" value="@creador">
                    </div>
                    <div class="input-group">
                        <label><i class="ph ph-image-square"></i> Logo Global</label>
                        <button class="btn-outline" onclick="document.getElementById('global-logo-input').click()">
                            <i class="ph ph-upload-simple"></i> Subir Logo
                        </button>
                        <input type="file" id="global-logo-input" accept="image/*" style="display: none;" onchange="updateGlobalLogo(this)">
                    </div>
                    <div class="input-group">
                        <label><i class="ph ph-aspect-ratio"></i> Formato de Exportación</label>
                        <div class="ratio-toggle">
                            <button class="ratio-btn active" id="btn-ratio-11" onclick="setRatio('1:1')">1:1 (Cuadrado)</button>
                            <button class="ratio-btn" id="btn-ratio-45" onclick="setRatio('4:5')">4:5 (Retrato)</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="panel-section">
                <h3><i class="ph-bold ph-paint-brush"></i> Tema Visual</h3>
                <div class="theme-selector">
                    <label class="theme-card dark-aura">
                        <input type="radio" name="theme" value="tpl-aura" onchange="changeTheme()" checked>
                        <span>Aura (Neón/Glass)</span>
                    </label>
                    <label class="theme-card minimal-koe">
                        <input type="radio" name="theme" value="tpl-thread" onchange="changeTheme()">
                        <span>Thread (Minimalista)</span>
                    </label>
                    <label class="theme-card brutal-acid">
                        <input type="radio" name="theme" value="tpl-acid" onchange="changeTheme()">
                        <span>Acid (Brutalista)</span>
                    </label>
                    <label class="theme-card editorial">
                        <input type="radio" name="theme" value="tpl-editorial" onchange="changeTheme()">
                        <span>Editorial (Moda)</span>
                    </label>
                    <label class="theme-card startup">
                        <input type="radio" name="theme" value="tpl-startup" onchange="changeTheme()">
                        <span>Startup (SaaS)</span>
                    </label>
                    <label class="theme-card bento">
                        <input type="radio" name="theme" value="tpl-bento" onchange="changeTheme()">
                        <span>Bento Box (Apple)</span>
                    </label>
                    <label class="theme-card terminal">
                        <input type="radio" name="theme" value="tpl-terminal" onchange="changeTheme()">
                        <span>Terminal (Hacker)</span>
                    </label>
                    <label class="theme-card notion">
                        <input type="radio" name="theme" value="tpl-notion" onchange="changeTheme()">
                        <span>Notion (B/N)</span>
                    </label>
                </div>
            </div>

            <div class="panel-section">
                <h3><i class="ph-bold ph-plus-square"></i> Añadir Diapositiva</h3>
                <div class="add-grid">
                    <button onclick="addSlide('titulo')"><i class="ph ph-text-h"></i> Portada</button>
                    <button onclick="addSlide('texto')"><i class="ph ph-paragraph"></i> Texto</button>
                    <button onclick="addSlide('lista')"><i class="ph ph-list-bullets"></i> Lista</button>
                    <button onclick="addSlide('cita')"><i class="ph ph-quotes"></i> Cita</button>
                    <button onclick="addSlide('comparativa')"><i class="ph ph-columns"></i> Comparativa</button>
                    <button onclick="addSlide('tweet')"><i class="ph ph-twitter-logo"></i> Tweet / Hilo</button>
                    <button onclick="addSlide('cifra')"><i class="ph ph-number-circle-seven"></i> Gran Cifra</button>
                    <button onclick="addSlide('timeline')"><i class="ph ph-git-commit"></i> Paso a Paso</button>
                    <button class="span-2" onclick="addSlide('media')"><i class="ph ph-image"></i> Recurso Central</button>
                    <button class="span-2" onclick="addSlide('cierre')"><i class="ph ph-bell-ringing"></i> Cierre (CTA)</button>
                </div>
            </div>
        </aside>

        <main class="canvas-area">
            <div class="canvas-notice">
                <i class="ph ph-info"></i> Haz clic en cualquier texto para editar. Usa la barra izquierda de cada slide para añadir imágenes.
            </div>
            <div id="slides-wrapper">
                <!-- Slides aquí -->
            </div>
        </main>
    </div>

    <div id="toast-container"></div>

    <script src="app.js"></script>
</body>
</html>
